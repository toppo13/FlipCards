<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>FlipCards</title>
    <style>
        body {
            text-align: center;
            font-family: sans-serif;
        }

        #game,
        #restartButton {
            display: none;
        }

        td.card {
            width: 50px;
            height: 70px;
            border: 1px solid blue;
            border-radius: 10px;
            text-align: center;
            background-color: white;
            box-shadow: rgb(128, 128, 128) 5px 5px;
            background-size: cover;
            padding: 0;
        }

        td.back {
            background-image: url("card.png");
            background-size: 50px 70px;
        }

        #titleScreen {
            margin-top: 100px;
        }

        button {
            font-size: 20px;
            padding: 10px 20px;
            margin: 10px;
        }
    </style>
    <script>
        "use strict";
        Array.prototype.shuffle = function () {
            let i = this.length;
            while (i) {
                let j = Math.floor(Math.random() * i);
                let t = this[--i];
                this[i] = this[j];
                this[j] = t;
            }
            return this;
        };

        let timer = NaN;
        let flipTimer = NaN;
        let score = 0;
        let prevCard = null;
        let startTime = null;
        let mode = "hard"; // "easy" または "hard"

        function showTitle() {
            document.getElementById("titleScreen").style.display = "block";
            document.getElementById("game").style.display = "none";
            document.getElementById("restartButton").style.display = "none";
        }

        function startGame(selectedMode) {
            mode = selectedMode; // "easy" or "hard"
            document.getElementById("titleScreen").style.display = "none";
            document.getElementById("game").style.display = "block";
            document.getElementById("restartButton").style.display = "block";
            resetGame();
        }

        function resetGame() {
            clearInterval(timer);
            clearTimeout(flipTimer);
            score = 0;
            prevCard = null;
            flipTimer = NaN;

            let table = document.getElementById("table");
            table.innerHTML = "";

            let cards = [];
            let mark = (mode === "easy") ? ["♥", "♠"] : ["♥", "♦", "♠", "♧"];
            for (let j = 0; j < mark.length; j++) {
                for (let i = 0; i < 13; i++) {
                    cards.push(mark[j] + " " + (i + 1));
                }
            }
            cards.shuffle();

            let rows = (mode === "easy") ? 2 : 4;
            for (let i = 0; i < rows; i++) {
                let tr = document.createElement("tr");
                for (let j = 0; j < 13; j++) {
                    let td = document.createElement("td");
                    td.className = "card back";
                    td.dataset.number = cards[i * 13 + j];
                    td.dataset.flipped = "false";
                    td.onclick = flip;
                    tr.appendChild(td);
                }
                table.appendChild(tr);
            }

            startTime = new Date();
            document.getElementById("time").textContent = "0";
            timer = setInterval(tick, 1000);
        }

        function tick() {
            let now = new Date();
            let elapsed = Math.floor((now.getTime() - startTime.getTime()) / 1000);
            document.getElementById("time").textContent = elapsed;
        }

        function flip(e) {
            let src = e.target;
            if (flipTimer || src.dataset.flipped === "true") return;

            let num = src.dataset.number;
            let suitChar = num.charAt(0);
            let numVal = num.substring(2);

            let suit = {
                "♥": "h",
                "♦": "d",
                "♠": "s",
                "♧": "c"
            }[suitChar];

            let img = document.createElement("img");
            img.src = `trump/${suit}${numVal}.png`;
            img.style.width = "100%";
            img.style.height = "100%";
            src.innerHTML = "";
            src.appendChild(img);
            src.className = "card";
            src.dataset.flipped = "true";

            if (prevCard == null) {
                prevCard = src;
                return;
            }

            let n0 = prevCard.dataset.number.substring(2);
            let n1 = numVal;
            if (n0 == n1) {
                let totalPairs = 13; // イージーもハードも同じ（1〜13の数字）
                if (++score == totalPairs) {
                    clearInterval(timer);
                    alert("クリア！");
                }
                prevCard = null;
                clearTimeout(flipTimer);
            } else {
                flipTimer = setTimeout(function () {
                    for (let td of [src, prevCard]) {
                        td.innerHTML = "";
                        td.className = "card back";
                        td.dataset.flipped = "false";
                    }
                    prevCard = null;
                    flipTimer = NaN;
                }, 1000);
            }
        }

        function restart() {
            if (confirm("ゲームをリスタートしますか？")) {
                clearInterval(timer);
                showTitle();
            }
        }

        window.onload = showTitle;
    </script>
</head>

<body>
    <!-- タイトル画面 -->
    <div id="titleScreen">
        <h1>FlipCards（神経衰弱）</h1>
        <button onclick="startGame('easy')">イージーモードで開始</button>
        <button onclick="startGame('hard')">ハードモードで開始</button>
    </div>

    <!-- ゲーム画面 -->
    <div id="game">
        <table id="table" style="margin: 0 auto;"></table>
        <h2>経過時間：<span id="time">0</span>秒</h2>
    </div>

    <!-- リスタートボタン -->
    <button id="restartButton" onclick="restart()">リスタート</button>
</body>

</html>
